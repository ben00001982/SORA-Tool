<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SORA v2.5 Certification Tool</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f8f9fa;
        --color-background-tertiary: #f1f3f5;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #6b7280;
        --color-text-tertiary: #9ca3af;
        --color-border-tertiary: rgba(0,0,0,0.10);
        --color-border-secondary: rgba(0,0,0,0.18);
        --color-border-primary: rgba(0,0,0,0.28);
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1a1a1a;
          --color-background-secondary: #242424;
          --color-background-tertiary: #2a2a2a;
          --color-text-primary: #f0f0f0;
          --color-text-secondary: #a0a0a0;
          --color-text-tertiary: #686868;
          --color-border-tertiary: rgba(255,255,255,0.10);
          --color-border-secondary: rgba(255,255,255,0.18);
          --color-border-primary: rgba(255,255,255,0.28);
        }
      }
      html, body { margin: 0; padding: 0; font-family: var(--font-sans); background: var(--color-background-tertiary); color: var(--color-text-primary); }
      #root { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }
      input, select, textarea, button { font-family: inherit; }
      a { color: #1d4ed8; }
      code { font-family: var(--font-mono); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
